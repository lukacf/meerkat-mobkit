project: meerkat-mobkit
version: 0.2.0
summary: >-
  Full-program RCT specification for MobKit as the Meerkat companion layer:
  startup orchestration, module supervision/routing, session stores, auth,
  SSE/event transport, RPC boundary, console, SDKs, and operational modules.
source_of_truth:
  - docs/rct/original-plan.md
principles:
  - Meerkat is the runtime; MobKit does not wrap agent construction/tool dispatch.
  - Data over callbacks for spawn/build context.
  - Hot-path infrastructure stays in-process.
  - Operational subsystems run as MCP modules.
  - Two modes (library + RPC) share one module system.
  - Working implementations only; no placeholder abstractions.

meerkat_prerequisites:
  - id: MK-001
    text: MobEventRouter merged stream API exists and is usable by core runtime.
  - id: MK-002
    text: inject_and_subscribe(id, msg) exists for scoped interaction subscriptions.
  - id: MK-003
    text: subscribe_agent_events(id) and subscribe_all_agent_events() exist.
  - id: MK-004
    text: SpawnPolicy + respawn(id, msg) + AttributedEvent are present.
  - id: MK-005
    text: Roster::session_id(id) and Roster::find_by_label(k, v) exist.
  - id: MK-006
    text: SessionBuildOptions.app_context/additional_instructions and SpawnMemberSpec.resume_session_id flow end-to-end.

requirements:
  - id: TYPE-001
    kind: TYPE
    text: Unified event envelope and event variants exist as stable serializable types.
  - id: TYPE-002
    kind: TYPE
    text: Module configuration and restart policy types exist as stable serializable types.
  - id: TYPE-003
    kind: TYPE
    text: Bootstrap/discovery data types exist for spawn inputs and pre-spawn carry-in.
  - id: TYPE-004
    kind: TYPE
    text: Runtime capability metadata exposes loaded modules and contract_version.

  - id: CONTRACT-001
    kind: CONTRACT
    text: Core parses real module-process JSON-line event envelopes over stdio.
  - id: CONTRACT-002
    kind: CONTRACT
    text: Core rejects malformed/invalid process output with typed parse errors.
  - id: CONTRACT-003
    kind: CONTRACT
    text: Core enforces process-response timeout behavior at module boundary.
  - id: CONTRACT-004
    kind: CONTRACT
    text: Meerkat prerequisite APIs from source-of-truth plan exist in selected baseline.
  - id: CONTRACT-005
    kind: CONTRACT
    text: RPC capabilities response includes contract_version; no method-level versioning.

  - id: CHOKE-001
    kind: CHOKE
    text: Mixed agent/module event lines normalize through a shared runtime envelope path.

  - id: REQ-001
    kind: REQ
    text: Bootstrap sequence starts mob, modules, and merged event stream in defined order.
  - id: REQ-002
    kind: REQ
    text: Task supervisor launches module processes and reports health transitions.
  - id: REQ-003
    kind: REQ
    text: Event bus merges agent-attributed and module events into unified stream.
  - id: REQ-004
    kind: REQ
    text: Module router proxies core calls to loaded module boundaries.
  - id: REQ-005
    kind: REQ
    text: Library and RPC modes expose the same module-system behavior.
  - id: REQ-006
    kind: REQ
    text: Runtime exposes reconcile(specs) and spawn_member(spec) operations.
  - id: REQ-007
    kind: REQ
    text: Ordered shutdown drains in-flight turns and terminates module processes cleanly.
  - id: REQ-008
    kind: REQ
    text: Module health check uses MCP tools/list success/timeout semantics.

  - id: RPC-001
    kind: REQ
    text: mobkit-rpc is a JSON-RPC superset of rkat-rpc with mobkit/status/capabilities/reconcile/spawn_member/events.
  - id: RPC-002
    kind: REQ
    text: Per-module JSON-RPC methods are proxied by core and return typed unloaded-module errors when absent.

  - id: STORE-001
    kind: REQ
    text: BigQuery session store supports streaming inserts, tombstones, dedup read path, and GC.
  - id: STORE-002
    kind: REQ
    text: JSON session store supports file-per-session persistence with locking.
  - id: STORE-003
    kind: REQ
    text: Stores are in-process SessionStore implementations suitable for hot-path saves.

  - id: SSE-001
    kind: REQ
    text: SSE bridge serves scoped interaction streams, per-agent streams, and merged mob streams.
  - id: SSE-002
    kind: REQ
    text: SSE bridge supports reconnect backfill ring buffer and keep-alive pings.

  - id: AUTH-001
    kind: REQ
    text: Auth supports Google/GitHub/generic OIDC OAuth flows and JWKS-based JWT validation.
  - id: AUTH-002
    kind: REQ
    text: Admin allowlist and service-to-service OIDC are enforceable at middleware boundary.
  - id: AUTH-003
    kind: REQ
    text: RPC-mode SDK auth middleware validates JWT locally without per-request IPC.

  - id: MOD-001
    kind: REQ
    text: Scheduling module supports timezone-aware cron, jitter, catch-up, and idempotent claiming.
  - id: MOD-002
    kind: REQ
    text: Routing module supports rule resolution strategies and wiring bridge integration.
  - id: MOD-003
    kind: REQ
    text: Delivery module supports sink adapters, retries/backoff, rate limits, and delivery history.
  - id: MOD-004
    kind: REQ
    text: Gating module enforces R0-R3 policy, approval routing, and audit semantics.
  - id: MOD-005
    kind: REQ
    text: Memory module supports configured stores (graph/vector/timeline/todo/top-of-mind) and tool surface.

  - id: SDK-001
    kind: REQ
    text: TypeScript SDK provides typed client, console route helpers, and module-authoring helpers.
  - id: SDK-002
    kind: REQ
    text: Python SDK provides typed client, console route helpers, and module-authoring helpers.
  - id: CONSOLE-001
    kind: REQ
    text: Console renders capability-driven base panels and module panels via app backend routes.

  - id: CHOKE-101
    kind: CHOKE
    text: JSON-RPC request ingress to runtime method dispatch preserves method/id/params semantics.
  - id: CHOKE-102
    kind: CHOKE
    text: Runtime module-router handoff to module process boundary preserves typed error/result contracts.
  - id: CHOKE-103
    kind: CHOKE
    text: Session service persistence handoff to BQ/JSON stores preserves latest-row/tombstone semantics.
  - id: CHOKE-104
    kind: CHOKE
    text: Event bus to SSE bridge handoff preserves event_id ordering and reconnect backfill semantics.
  - id: CHOKE-105
    kind: CHOKE
    text: Auth middleware to console route handlers preserves identity and authorization decisions.
  - id: CHOKE-106
    kind: CHOKE
    text: Scheduling module outputs to runtime dispatch preserve trigger idempotency and routing intent.
  - id: CHOKE-107
    kind: CHOKE
    text: Routing resolver outputs to delivery sinks preserve target selection and message payload intent.
  - id: CHOKE-108
    kind: CHOKE
    text: Gating decisions to delivery-based approval flow preserve risk-tier and approver constraints.
  - id: CHOKE-109
    kind: CHOKE
    text: Memory assertions to gating conflict checks preserve conflict signals for action blocking.
  - id: CHOKE-110
    kind: CHOKE
    text: SDK client request/response mapping preserves RPC method contracts and error shapes.

  - id: E2E-401
    kind: E2E
    text: End-to-end RPC interaction covers built-ins, module proxy calls, unloaded-module errors, and runtime mutation ops.
  - id: E2E-501
    kind: E2E
    text: End-to-end session persistence covers write/read/dedup/tombstone across configured stores.
  - id: E2E-601
    kind: E2E
    text: End-to-end SSE experience covers stream subscription, keep-alive, reconnect, and backfill.
  - id: E2E-701
    kind: E2E
    text: End-to-end auth flow covers OAuth/OIDC login, JWT validation, and protected console access.
  - id: E2E-801
    kind: E2E
    text: End-to-end console experience covers capability discovery and module-panel data flows.
  - id: E2E-901
    kind: E2E
    text: End-to-end scheduled action flow covers cron evaluation, trigger dispatch, and idempotent execution.
  - id: E2E-1001
    kind: E2E
    text: End-to-end routing and delivery flow covers route resolution to sink delivery with retries/history.
  - id: E2E-1101
    kind: E2E
    text: End-to-end TS/Python SDK parity flow covers shared behavior and error-shape compatibility.
  - id: E2E-1201
    kind: E2E
    text: End-to-end R2/R3 gating flow covers consequence evaluation, approval, timeout, and audit trail.
  - id: E2E-1301
    kind: E2E
    text: End-to-end memory/gating flow covers conflict detection and blocked action behavior.
  - id: E2E-1401
    kind: E2E
    text: Program-level end-to-end smoke covers startup, auth, rpc, module ops, events, and shutdown.

decisions:
  - id: DEC-001
    text: BigQuery dataset/table names are configurable; no hardcoded project.
  - id: DEC-002
    text: Auth default is Google OAuth with email allowlist.
  - id: DEC-003
    text: mobkit.toml is trusted input for module command configuration.
  - id: DEC-004
    text: Console surface is REST JSON behind application auth middleware.
  - id: DEC-005
    text: v0.1 is single-replica; no multi-replica guarantees.
  - id: DEC-006
    text: v0.1 tracks metrics but does not set hard SLO targets.
  - id: DEC-007
    text: Release targets are crates.io, npm, PyPI, and GitHub Releases.

constraints:
  - Real external dependency checks are required before each new subsystem phase.
  - Phase 0/0b validates external assumptions with real calls/processes; assumption mismatch is a hard block.
  - External preflight checks prove boundary behavior relied on by later phases; they do not replace full subsystem behavior tests in later phases.
  - External credentialed checks are env-gated and excluded from fast default test suite.
  - Every phase gate requires direct execution evidence and 3 independent reviews.
  - No architectural re-abstraction of Meerkat APIs is allowed in MobKit.
