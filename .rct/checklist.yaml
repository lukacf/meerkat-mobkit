traceability_policy:
  statuses: [MISSING, TYPED, WIRED, DEFERRED, STUBBED]
  rules:
    - Every ID in spec.meerkat_prerequisites, spec.requirements, and spec.decisions must have a traceability row.
    - WIRED requires runtime caller plus behavioral test evidence.
    - Any MISSING/DEFERRED/STUBBED row blocks phase completion.
    - Typed-but-unwired carry-forward list is mandatory and must be empty at final gate.
  enforcement:
    block_on_statuses: [MISSING, DEFERRED, STUBBED]
    require_direct_test_execution_proof: true
    require_independent_reviewers: 3

evidence:
  completed_foundation_direct_execution:
    - cargo check --workspace
    - cargo clippy --workspace --all-targets --all-features -- -D warnings
    - cargo test --workspace
    - cargo test --workspace -- --ignored
  foundation_traceability_doc: docs/rct/traceability.md
  release_metadata: docs/rct/release-targets.json
