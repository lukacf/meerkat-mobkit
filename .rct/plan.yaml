project: meerkat-mobkit
program_scope: full-master-plan
phases:
  - phase: 0
    name: External Boundary Validation (Foundation)
    goal: Prove external contracts with real process/API boundaries before behavior wiring.
    status: completed
    tasks:
      - id: P0-T1
        reqs: [CONTRACT-001, CONTRACT-002]
        done_when: >-
          Integration tests spawn real module subprocesses and prove valid JSON-line parsing,
          schema-invalid rejection, and unexpected payload handling.
      - id: P0-T2
        reqs: [CONTRACT-003]
        done_when: >-
          Integration test proves timeout behavior against a real never-responding subprocess.
      - id: P0-T3
        reqs: [CHOKE-001]
        done_when: >-
          Integration test feeds mixed real process outputs through a runtime normalization path
          and asserts exact unified-envelope outputs and typed error classifications.
      - id: P0-T4
        reqs: [TYPE-001, TYPE-002, TYPE-003]
        done_when: >-
          Type contracts round-trip via serde and integration test proves runtime boundary code
          accepts/produces those types over real process I/O.
      - id: P0-T5
        reqs: [CONTRACT-004]
        done_when: >-
          Baseline validation checks Meerkat prerequisite APIs in merged repository and fails
          with explicit diagnostics if any required API is missing.
      - id: P0-T6
        reqs: [CONTRACT-005, TYPE-004]
        done_when: >-
          Integration test launches RPC boundary process and verifies capabilities response
          includes contract_version.

  - phase: 1
    name: Core Runtime Foundation
    goal: Prove mob startup with module process spawning and merged event stream behavior.
    status: completed
    tasks:
      - id: P1-T1
        reqs: [REQ-001, REQ-007]
        done_when: >-
          Runtime integration test proves startup ordering and graceful shutdown without orphan
          module processes.
      - id: P1-T2
        reqs: [REQ-002, REQ-008]
        done_when: >-
          Runtime integration test proves supervisor health transitions, restart policy behavior,
          and health checks from MCP tools/list semantics.
      - id: P1-T3
        reqs: [REQ-003]
        done_when: >-
          Runtime integration test with multiple module processes proves merged stream attribution
          and ordering semantics.
      - id: P1-T4
        reqs: [REQ-004, REQ-005]
        done_when: >-
          Runtime integration test proves module router proxies real requests and returns typed
          unloaded-module errors consistently across library and RPC boundaries.

  - phase: 2
    name: Decision Enforcement (v0.1 defaults)
    goal: Encode practical v0.1 decisions as enforceable runtime/config contracts.
    status: completed
    tasks:
      - id: P2-T1
        reqs: [DEC-001, DEC-003]
        done_when: >-
          Config validation tests prove BQ names are configurable and mobkit.toml trusted command
          declarations are loaded into runtime config without hardcoded project assumptions.
      - id: P2-T2
        reqs: [DEC-002, DEC-004]
        done_when: >-
          Integration tests prove auth defaults (Google OAuth + email allowlist) and console-route
          auth middleware enforcement behavior.
      - id: P2-T3
        reqs: [DEC-005, DEC-006, DEC-007]
        done_when: >-
          Documentation and config tests prove single-replica constraint, metrics-without-SLO policy,
          and release target metadata are present and validated.

  - phase: 3
    name: Foundation Closure Gate
    goal: Close traceability for the foundation slice with all required runtime proofs.
    status: completed
    tasks:
      - id: P3-T1
        reqs: [TYPE-001, TYPE-002, TYPE-003, TYPE-004, CONTRACT-001, CONTRACT-002, CONTRACT-003, CONTRACT-004, CONTRACT-005, CHOKE-001, REQ-001, REQ-002, REQ-003, REQ-004, REQ-005, REQ-007, REQ-008, DEC-001, DEC-002, DEC-003, DEC-004, DEC-005, DEC-006, DEC-007]
        done_when: >-
          Full suite is executed with direct proof; typed-but-unwired list is empty for completed
          foundation requirements; traceability has no MISSING/DEFERRED/STUBBED rows in scope.

  - phase: 0b
    name: External Boundary Validation (Roadmap Preflight)
    goal: Validate all external contracts required by phases 4-14 using real APIs/processes.
    status: completed
    tasks:
      - id: P0B-T1
        reqs: [RPC-001, RPC-002]
        done_when: >-
          Real JSON-RPC probe proves current method/notification assumptions for built-in and
          module-proxy calls, and hard-fails on any mismatch in observed error-shape/availability.
      - id: P0B-T2
        reqs: [STORE-001]
        done_when: >-
          Real BigQuery preflight proves streaming, dedup, tombstone, and truncate assumptions with
          disposable data, and hard-fails if observed semantics differ.
        execution_notes:
          - Use fixed external preflight project `king-dnn-training-dev`.
          - Optionally run gcloud discovery only as sanity check, not selection logic.
          - Use disposable dataset/table names with timestamp suffixes and cleanup on completion.
      - id: P0B-T3
        reqs: [STORE-002, STORE-003]
        done_when: >-
          Real filesystem process-level checks prove JSON store lock and recovery assumptions, and
          hard-fail on any non-deterministic or contradictory behavior.
      - id: P0B-T4
        reqs: [SSE-001, SSE-002]
        done_when: >-
          Live HTTP SSE probes prove event-id, reconnect/backfill, and keep-alive assumptions at the
          protocol boundary, and hard-fail on divergence.
      - id: P0B-T5
        reqs: [AUTH-001, AUTH-002, AUTH-003]
        done_when: >-
          Real OIDC discovery and JWKS key-availability checks prove provider metadata/signing-key
          assumptions needed for later auth work, and hard-fail if discovery or JWKS behavior
          differs.
      - id: P0B-T6
        reqs: [MOD-001, MOD-002, MOD-003, MOD-004, MOD-005]
        done_when: >-
          Real module-process probes prove discovery plus process-level health and representative
          tool-call contract viability assumptions across module families, and hard-fail on missing
          or incompatible process behavior.
      - id: P0B-T7
        reqs: [SDK-001, SDK-002, CONSOLE-001]
        done_when: >-
          Real locally-runnable TS/Python toolchain probes plus runtime RPC/console contract checks
          prove current request/response assumption-level boundaries used by later SDK/console
          phases, and hard-fail on incompatibility.

  - phase: 3c
    name: Roadmap Top-Down Targets (Red-First)
    goal: Define and wire all roadmap chokepoint and E2E tests before behavior implementation.
    status: completed
    tasks:
      - id: P3C-T1
        reqs: [CHOKE-101, CHOKE-102, CHOKE-103, CHOKE-104, CHOKE-105, CHOKE-106, CHOKE-107, CHOKE-108, CHOKE-109, CHOKE-110]
        done_when: >-
          All roadmap chokepoint tests compile and run fully wired, and are red only at assertion
          points for not-yet-implemented behavior.
      - id: P3C-T2
        reqs: [E2E-401, E2E-501, E2E-601, E2E-701, E2E-801, E2E-901, E2E-1001, E2E-1101, E2E-1201, E2E-1301, E2E-1401]
        done_when: >-
          All roadmap E2E scenarios compile and run end-to-end with infrastructure wired, and are
          red only at behavior assertions.
      - id: P3C-T3
        reqs: [RPC-001, STORE-001, SSE-001, AUTH-001, MOD-001, SDK-001, CONSOLE-001]
        done_when: >-
          Red-first target-definition evidence is recorded in .rct/outputs with command transcripts
          showing no infrastructure-level failures.

  - phase: 4
    name: mobkit-rpc Product Surface
    goal: Deliver mobkit-rpc as rkat-rpc superset with core and per-module methods.
    status: completed
    tasks:
      - id: P4-T1
        reqs: [RPC-001, CHOKE-101, CHOKE-110, E2E-401]
        done_when: >-
          Red-defined chokepoint and E2E tests for RPC built-ins/notifications turn green with
          real runtime behavior (no assertion-level reds remain).
      - id: P4-T2
        reqs: [RPC-002, REQ-005, CHOKE-102, E2E-401]
        done_when: >-
          Module proxy chokepoint tests and E2E unloaded-module scenarios turn green with typed
          parity across library/RPC boundaries.
      - id: P4-T3
        reqs: [REQ-006, CHOKE-101, E2E-401]
        done_when: >-
          reconcile/spawn_member runtime mutation behavior turns green in pre-defined E2E and
          request-dispatch chokepoint tests.

  - phase: 5
    name: Session Stores
    goal: Ship in-process session stores for production and local development.
    status: completed
    tasks:
      - id: P5-T1
        reqs: [STORE-001, DEC-001, CHOKE-103, E2E-501]
        done_when: >-
          BQ store chokepoint and E2E persistence tests (predefined in red phase) turn green for
          streaming/dedup/tombstone semantics and configurable naming.
      - id: P5-T2
        reqs: [STORE-002, STORE-003, CHOKE-103, E2E-501]
        done_when: >-
          JSON store chokepoint and E2E persistence tests turn green for locking, crash recovery,
          and SessionStore compatibility.

  - phase: 6
    name: SSE Bridge
    goal: Provide production SSE transport utilities for interaction, agent, and mob streams.
    status: completed
    tasks:
      - id: P6-T1
        reqs: [SSE-001, CHOKE-104, E2E-601]
        done_when: >-
          Predefined chokepoint and E2E stream tests turn green for interaction, per-agent, and
          merged mob stream behavior.
      - id: P6-T2
        reqs: [SSE-002, CHOKE-104, E2E-601]
        done_when: >-
          Reconnect/backfill/keep-alive chokepoint and E2E tests turn green with stable event-id
          semantics.

  - phase: 7
    name: Auth Subsystem
    goal: Implement library-mode and RPC-mode auth with local JWT validation and provider flows.
    status: completed
    tasks:
      - id: P7-T1
        reqs: [AUTH-001, DEC-002, CHOKE-105, E2E-701]
        done_when: >-
          Predefined auth chokepoint and E2E login/JWKS tests turn green for configured providers
          and key-rotation behavior.
      - id: P7-T2
        reqs: [AUTH-002, CHOKE-105, E2E-701]
        done_when: >-
          Middleware chokepoint and E2E authorization tests turn green for allowlist and service
          identities.
      - id: P7-T3
        reqs: [AUTH-003, CHOKE-110, E2E-701]
        done_when: >-
          SDK auth chokepoint and E2E tests turn green for local JWT validation without per-request
          IPC.

  - phase: 8
    name: Console Surface
    goal: Ship capability-driven admin console APIs and frontend package integration contract.
    status: completed
    tasks:
      - id: P8-T1
        reqs: [CONSOLE-001, DEC-004, CHOKE-105, E2E-801]
        done_when: >-
          Predefined console/auth chokepoint and E2E capability-panel tests turn green for route
          helpers and panel data contracts.
      - id: P8-T2
        reqs: [REQ-003, CHOKE-104, E2E-801]
        done_when: >-
          Event-to-console chokepoint and E2E activity-feed tests turn green for unified stream
          consumption.

  - phase: 9
    name: Scheduling Module
    goal: Deliver mobkit-scheduling MCP module and runtime orchestration hooks.
    status: completed
    tasks:
      - id: P9-T1
        reqs: [MOD-001, CHOKE-106, E2E-901]
        done_when: >-
          Scheduling chokepoint and E2E trigger tests turn green for cron/timezone/jitter/catch-up
          and idempotent claim behavior.
      - id: P9-T2
        reqs: [REQ-002, CHOKE-106, E2E-901]
        done_when: >-
          Supervisor/scheduling chokepoint tests and E2E dispatch lifecycle tests turn green for
          health and restart behavior.

  - phase: 10
    name: Routing + Delivery Modules
    goal: Deliver routing resolution and outbound transport modules with operational reliability.
    status: completed
    tasks:
      - id: P10-T1
        reqs: [MOD-002, CHOKE-107, E2E-1001]
        done_when: >-
          Routing chokepoint and E2E route-resolution tests turn green for startup/runtime route
          updates.
      - id: P10-T2
        reqs: [MOD-003, CHOKE-107, E2E-1001]
        done_when: >-
          Delivery chokepoint and E2E sink-delivery tests turn green for retries/backoff/rate-limit
          and history behavior.

  - phase: 11
    name: SDKs (TypeScript + Python)
    goal: Deliver non-Rust app enablement for runtime operations and module authoring.
    status: completed
    tasks:
      - id: P11-T1
        reqs: [SDK-001, CHOKE-110, E2E-1101]
        done_when: >-
          TS SDK chokepoint and E2E parity tests turn green for typed client/console/module-authoring
          contracts.
      - id: P11-T2
        reqs: [SDK-002, CHOKE-110, E2E-1101]
        done_when: >-
          Python SDK chokepoint and E2E parity tests turn green for typed client/console/module-authoring
          contracts.
      - id: P11-T3
        reqs: [RPC-001, RPC-002, CHOKE-110, E2E-1101]
        done_when: >-
          Cross-SDK E2E parity and chokepoint tests turn green for shared RPC contracts and errors.

  - phase: 12
    name: Gating Module
    goal: Deliver risk-tiered execution gating with consequence and approval flows.
    status: completed
    tasks:
      - id: P12-T1
        reqs: [MOD-004, CHOKE-108, E2E-1201]
        done_when: >-
          Gating chokepoint and E2E tests turn green for R0-R3 policy evaluation, local fast path,
          consequence modes, and audit behavior.
      - id: P12-T2
        reqs: [MOD-003, CHOKE-108, E2E-1201]
        done_when: >-
          Approval-flow chokepoint and E2E tests turn green for delivery-route approvals and
          non-self-approval enforcement.

  - phase: 13
    name: Memory Module
    goal: Deliver Elephant-backed persistent memory module and agent-facing memory tools.
    status: completed
    tasks:
      - id: P13-T1
        reqs: [MOD-005, CHOKE-109, E2E-1301]
        done_when: >-
          Memory chokepoint and E2E tests turn green for knowledge/vector/timeline/todo/top-of-mind
          query/index/tool behavior.
      - id: P13-T2
        reqs: [MOD-004, MOD-005, CHOKE-109, E2E-1301]
        done_when: >-
          Memory-to-gating chokepoint and E2E conflict tests turn green for conflict blocking.

  - phase: 14
    name: Program Final Gate
    goal: Close full-program traceability and release readiness.
    status: completed
    tasks:
      - id: P14-T1
        reqs: [MK-001, MK-002, MK-003, MK-004, MK-005, MK-006, TYPE-001, TYPE-002, TYPE-003, TYPE-004, CONTRACT-001, CONTRACT-002, CONTRACT-003, CONTRACT-004, CONTRACT-005, CHOKE-001, CHOKE-101, CHOKE-102, CHOKE-103, CHOKE-104, CHOKE-105, CHOKE-106, CHOKE-107, CHOKE-108, CHOKE-109, CHOKE-110, E2E-401, E2E-501, E2E-601, E2E-701, E2E-801, E2E-901, E2E-1001, E2E-1101, E2E-1201, E2E-1301, E2E-1401, REQ-001, REQ-002, REQ-003, REQ-004, REQ-005, REQ-006, REQ-007, REQ-008, RPC-001, RPC-002, STORE-001, STORE-002, STORE-003, SSE-001, SSE-002, AUTH-001, AUTH-002, AUTH-003, MOD-001, MOD-002, MOD-003, MOD-004, MOD-005, SDK-001, SDK-002, CONSOLE-001, DEC-001, DEC-002, DEC-003, DEC-004, DEC-005, DEC-006, DEC-007]
        done_when: >-
          All predefined chokepoint and E2E tests are green with no assertion-level reds, full suite
          across crates/binaries/modules/SDKs passes, and traceability closure is complete.

phase_dependencies:
  - phase: 4
    requires: [0b, 3c]
  - phase: 5
    requires: [0b, 3c]
  - phase: 6
    requires: [0b, 3c]
  - phase: 7
    requires: [0b, 3c]
  - phase: 8
    requires: [0b, 3c]
  - phase: 9
    requires: [0b, 3c]
  - phase: 10
    requires: [0b, 3c]
  - phase: 11
    requires: [0b, 3c]
  - phase: 12
    requires: [0b, 3c]
  - phase: 13
    requires: [0b, 3c]
  - phase: 14
    requires: [0b, 3c]
